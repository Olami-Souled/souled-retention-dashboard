<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Souled Executive Report</title>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="executive.css">
</head>
<body>
  <nav class="top-nav">
    <a href="index.html" class="nav-link active">Executive Report</a>
    <a href="retention.html" class="nav-link">Retention Report</a>
  </nav>

  <header>
    <img src="logo.png" alt="Olami Souled" class="header-logo">
    <h1>Souled Executive Report</h1>
  </header>

  <div class="fy-controls">
    <label for="fySelect">Fiscal Year:</label>
    <select id="fySelect">
      <option value="FY26" selected>FY26 (Current)</option>
      <option value="FY25">FY25</option>
      <option value="both">Both (Side by Side)</option>
    </select>
    <span class="fy-note">FY runs Sep 1 &ndash; Aug 31</span>
  </div>

  <div class="toolbar">
    <div class="design-toggle">
      <button class="design-btn active" data-design="cards">KPI Cards</button>
      <button class="design-btn" data-design="table">Table View</button>
      <button class="design-btn" data-design="students">Number of Souled Students</button>
    </div>
    <button id="downloadBtn" class="download-btn" title="Download Excel with FY25 & FY26 data">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Download Excel
    </button>
  </div>

  <div id="cards-view"></div>
  <div id="table-view" style="display:none;"></div>
  <div id="students-view" style="display:none;">
    <section class="kpi-section">
      <h2 class="section-title">Souled Students with a Coach</h2>
      <div class="kpi-grid" style="grid-template-columns: minmax(220px, 280px);">
        <div class="kpi-card highlight">
          <div class="kpi-label">Current Matched Students</div>
          <div class="kpi-value" id="currentMatchedValue">—</div>
        </div>
      </div>
    </section>

    <section class="kpi-section">
      <div class="students-controls">
        <div class="control-group">
          <label for="studentsStart">Start:</label>
          <input type="date" id="studentsStart" />
        </div>
        <div class="control-group">
          <label for="studentsEnd">End:</label>
          <input type="date" id="studentsEnd" />
        </div>
        <div class="control-group granularity-toggle">
          <button class="gran-btn" data-gran="daily">Daily</button>
          <button class="gran-btn active" data-gran="weekly">Weekly</button>
          <button class="gran-btn" data-gran="monthly">Monthly</button>
        </div>
      </div>
      <div class="overlay-controls">
        <span class="overlay-label">Show on chart:</span>
        <label><input type="checkbox" data-overlay="capacity"> Total Capacity</label>
        <label><input type="checkbox" data-overlay="currentCapacity"> Current Capacity</label>
        <label><input type="checkbox" data-overlay="registrations"> New Registrations</label>
        <label><input type="checkbox" data-overlay="cpl"> Real CPL ($)</label>
        <span class="overlay-hint">CPL = Souled Meta spend &divide; new Souled registrations (excl. test)</span>
      </div>
      <div class="chart-container">
        <canvas id="studentsChart"></canvas>
      </div>
    </section>
  </div>

  <footer class="exec-footer">
    <p>Data sourced live from Salesforce.</p>
  </footer>

  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="executive.js"></script>
</body>
</html>

name: Refresh Meta spend
on:
  schedule:
    - cron: "20 4 * * *"   # daily 04:20 UTC (~07:20 Israel), after CPL refresh
  workflow_dispatch:
concurrency:
  group: refresh-meta-spend
  cancel-in-progress: false
jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: npm ci --omit=dev || npm install --omit=dev
      - name: Pull daily Meta spend (direct API) into data/meta_spend.json
        env:
          FACEBOOK_ADS_TOKEN: ${{ secrets.FACEBOOK_ADS_TOKEN }}
          FACEBOOK_AD_ACCOUNT_ID: ${{ secrets.FACEBOOK_AD_ACCOUNT_ID }}
        run: node scripts/refresh-meta-spend.js
      - name: Commit refreshed spend if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet data/meta_spend.json; then
            git add data/meta_spend.json
            git commit -m "Refresh Meta spend [auto]"
            for i in 1 2 3; do git pull --rebase --autostash && git push && break || sleep 5; done
          else
            echo "No change in meta_spend.json"
          fi

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Souled Executive Report</title>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="executive.css">
</head>
<body>
  <nav class="top-nav">
    <a href="index.html" class="nav-link active">Executive Report</a>
    <a href="retention.html" class="nav-link">Retention Report</a>
  </nav>

  <header>
    <img src="logo.png" alt="Olami Souled" class="header-logo">
    <h1>Souled Executive Report</h1>
  </header>

  <div class="fy-controls">
    <label for="fySelect">Fiscal Year:</label>
    <select id="fySelect">
      <option value="FY26" selected>FY26 (Current)</option>
      <option value="FY25">FY25</option>
      <option value="both">Both (Side by Side)</option>
    </select>
    <span class="fy-note">FY runs Sep 1 &ndash; Aug 31</span>
  </div>

  <div class="design-toggle">
    <button class="design-btn active" data-design="cards">KPI Cards</button>
    <button class="design-btn" data-design="table">Table View</button>
  </div>

  <div id="cards-view"></div>
  <div id="table-view" style="display:none;"></div>

  <footer class="exec-footer">
    <p>Data sourced live from Salesforce.</p>
  </footer>

  <script src="executive.js"></script>
</body>
</html>
